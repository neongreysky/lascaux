<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lascaux — the living wall</title>
<meta property="og:title" content="Lascaux — the living wall">
<meta property="og:description" content="draw something. no rules. leave a mark.">
<meta property="og:image" content="https://neongreysky.github.io/lascaux/og.png">
<meta property="og:url" content="https://neongreysky.github.io/lascaux">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link id="favicon" rel="icon" type="image/png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');

:root {
  --paper: #f0ebe0;
  --ink: #1a1208;
  --red: #a83228;
  --muted: #8a7560;
  --light-muted: #a89070;
  --shadow: rgba(0,0,0,0.10);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--paper);
  font-family: 'Courier Prime', monospace;
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}

#main-page {
  padding: 52px 40px 120px;
  max-width: 1400px;
  margin: 0 auto;
}

.site-title {
  font-family: 'Special Elite', serif;
  font-size: clamp(3.5rem, 9vw, 7rem);
  color: #7a1f10;
  letter-spacing: 0.03em;
  line-height: 0.95;
  margin-bottom: 8px;
}

.site-sub {
  font-family: 'Courier Prime', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.22em;
  color: var(--light-muted);
  text-transform: lowercase;
  margin-bottom: 36px;
}

.site-tagline { margin-bottom: 60px; }
.site-tagline p {
  font-size: 0.82rem;
  color: var(--muted);
  line-height: 2;
  letter-spacing: 0.07em;
}

#wall {
  columns: 5 180px;
  column-gap: 20px;
}

@media (max-width: 700px) {
  #wall { columns: 2 140px; }
  #main-page { padding: 36px 20px 100px; }
}

.wall-card {
  break-inside: avoid;
  margin-bottom: 20px;
  display: inline-block;
  width: 100%;
}

.wall-card-inner {
  background: #ffffff;
  padding: 5px 5px 26px;
  box-shadow: 1px 2px 8px var(--shadow);
  position: relative;
}

.wall-card-inner img {
  display: block;
  width: 100%;
  height: auto;
}

.wall-card-title {
  position: absolute;
  bottom: 6px;
  left: 7px;
  right: 7px;
  font-family: 'Special Elite', serif;
  font-size: 0.62rem;
  letter-spacing: 0.04em;
  color: #bbb;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.wall-card:nth-child(5n+1) .wall-card-inner { transform: rotate(-0.5deg); }
.wall-card:nth-child(5n+2) .wall-card-inner { transform: rotate(0.4deg); }
.wall-card:nth-child(5n+3) .wall-card-inner { transform: rotate(-0.2deg); }
.wall-card:nth-child(5n+4) .wall-card-inner { transform: rotate(0.6deg); }
.wall-card:nth-child(5n+5) .wall-card-inner { transform: rotate(-0.3deg); }
.wall-card-inner:hover { box-shadow: 3px 4px 14px rgba(0,0,0,0.16); position: relative; z-index: 10; }

#wall-loading, #empty-state {
  font-size: 0.65rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #ccc;
  padding: 40px 0;
}
@keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
#wall-loading { animation: pulse 1.6s infinite; }

#fab {
  position: fixed;
  bottom: 32px;
  right: 32px;
  width: 54px;
  height: 54px;
  background: var(--ink);
  color: var(--paper);
  font-family: 'Courier Prime', monospace;
  font-weight: 700;
  font-size: 1.6rem;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 2px 3px 0 rgba(0,0,0,0.3);
  z-index: 400;
  transition: background 0.12s;
  line-height: 1;
}
#fab:hover { background: var(--red); }

#format-picker {
  position: fixed;
  inset: 0;
  z-index: 500;
  background: rgba(240,235,224,0.97);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 36px;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
#format-picker.open { transform: translateY(0); }

.picker-label {
  font-size: 0.62rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
}

.format-options {
  display: flex;
  gap: 32px;
  align-items: flex-end;
}

.fmt-option {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  cursor: pointer;
}

.fmt-box {
  background: #fff;
  border: 1.5px solid #c8bfb0;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.08);
  transition: border-color 0.12s, box-shadow 0.12s;
}
.fmt-option:hover .fmt-box,
.fmt-option.selected .fmt-box {
  border-color: var(--ink);
  border-width: 2px;
  box-shadow: 3px 3px 0 rgba(0,0,0,0.18);
}

.fmt-portrait  { width: 64px; height: 96px; }
.fmt-landscape { width: 96px; height: 64px; }
.fmt-square    { width: 76px; height: 76px; }

.fmt-name {
  font-size: 0.6rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--light-muted);
  font-family: 'Courier Prime', monospace;
}
.fmt-option.selected .fmt-name { color: var(--ink); font-weight: 700; }

#start-drawing-btn {
  font-family: 'Courier Prime', monospace;
  font-weight: 700;
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 11px 32px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  cursor: pointer;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.25);
  opacity: 0.25;
  pointer-events: none;
  transition: opacity 0.15s, background 0.12s;
}
#start-drawing-btn.ready { opacity: 1; pointer-events: auto; }
#start-drawing-btn:hover { background: var(--red); }

.picker-close {
  position: absolute;
  top: 20px;
  right: 24px;
  background: none;
  border: none;
  font-family: 'Courier Prime', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--light-muted);
  cursor: pointer;
}
.picker-close:hover { color: var(--ink); }

#draw-panel {
  position: fixed;
  inset: 0;
  z-index: 600;
  display: flex;
  flex-direction: column;
  background: var(--paper);
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
}
#draw-panel.open { transform: translateY(0); }

.draw-toolbar {
  background: var(--ink);
  color: var(--paper);
  display: flex;
  flex-direction: column;
  border-bottom: 1px solid rgba(237,232,222,0.1);
}

.toolbar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  width: 100%;
}

.tlabel {
  font-size: 0.75rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: rgba(237,232,222,0.7);
  white-space: nowrap;
  flex-shrink: 0;
}

.tool-btn {
  background: transparent;
  border: 1.5px solid rgba(237,232,222,0.35);
  color: var(--paper);
  font-family: 'Courier Prime', monospace;
  font-size: 0.85rem;
  padding: 7px 13px;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: all 0.1s;
  white-space: nowrap;
  flex-shrink: 0;
}
.tool-btn:hover, .tool-btn.active {
  background: var(--paper);
  color: var(--ink);
  border-color: var(--paper);
}

.tool-btn {
  background: transparent;
  border: 1.5px solid rgba(237,232,222,0.3);
  color: var(--paper);
  font-family: 'Courier Prime', monospace;
  font-size: 0.8rem;
  padding: 6px 12px;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: all 0.1s;
  white-space: nowrap;
  flex-shrink: 0;
}
.tool-btn:hover, .tool-btn.active {
  background: var(--paper);
  color: var(--ink);
  border-color: var(--paper);
}

.tsep { width: 1px; height: 20px; background: rgba(237,232,222,0.2); flex-shrink: 0; }

input[type=range] { accent-color: #c8860a; cursor: pointer; flex-shrink: 0; }

input[type=color] {
  width: 26px; height: 26px;
  border: 2px solid rgba(237,232,222,0.3);
  background: none; cursor: pointer; padding: 0;
}

.swatches { display: flex; gap: 4px; }
.swatch {
  width: 18px; height: 18px;
  border: 1.5px solid rgba(237,232,222,0.25);
  cursor: pointer; transition: transform 0.1s; flex-shrink: 0;
}
.swatch:hover { transform: scale(1.3); border-color: white; }

#canvas-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(0,0,0,0.03) 28px),
    repeating-linear-gradient(90deg, transparent, transparent 27px, rgba(0,0,0,0.03) 28px);
  position: relative;
}

#draw-canvas {
  background: #fff;
  box-shadow: 4px 4px 20px rgba(0,0,0,0.15);
  cursor: none;
  touch-action: none;
  display: block;
}
#draw-canvas.text-mode { cursor: text; }

#brush-cursor {
  position: absolute;
  border: 1.5px solid rgba(0,0,0,0.55);
  border-radius: 50%;
  pointer-events: none;
  display: none;
  transform: translate(-50%, -50%);
  z-index: 5;
}
#brush-cursor::before,
#brush-cursor::after {
  content: '';
  position: absolute;
  background: rgba(0,0,0,0.55);
}
#brush-cursor::before {
  width: 1px;
  height: 8px;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
}
#brush-cursor::after {
  width: 8px;
  height: 1px;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
}

.draw-footer {
  padding: 10px 16px;
  border-top: 1.5px solid #d8d0c4;
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  background: var(--paper);
}

#drawing-title {
  font-family: 'Courier Prime', monospace;
  font-size: 0.85rem;
  border: none;
  border-bottom: 1.5px solid #c8bfb0;
  background: transparent;
  padding: 4px 6px;
  width: 240px;
  outline: none;
  letter-spacing: 0.05em;
  color: var(--ink);
}
#drawing-title::placeholder { color: #c0b8aa; }

.footer-spacer { flex: 1; }

#submit-status {
  font-size: 0.68rem;
  letter-spacing: 0.08em;
  color: var(--red);
  text-transform: uppercase;
}

#text-input-overlay { position: absolute; display: none; z-index: 20; }
#text-input-overlay input {
  font-family: 'Courier Prime', monospace;
  border: 1px dashed var(--red);
  background: rgba(255,255,255,0.9);
  outline: none; padding: 2px 4px;
  min-width: 60px; color: var(--ink);
}

.btn {
  font-family: 'Courier Prime', monospace;
  font-weight: 700;
  font-size: 0.7rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 7px 16px;
  border: 1.5px solid var(--ink);
  background: transparent;
  color: var(--ink);
  cursor: pointer;
  transition: background 0.1s, color 0.1s;
  white-space: nowrap;
}
.btn:hover { background: var(--ink); color: var(--paper); }
.btn.cta { background: var(--ink); color: var(--paper); }
.btn.cta:hover { background: var(--red); border-color: var(--red); }
.btn.ghost { border-color: transparent; color: var(--muted); font-weight: 400; }
.btn.ghost:hover { color: var(--ink); background: transparent; }

#toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: var(--ink);
  color: var(--paper);
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 10px 22px;
  z-index: 9000;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  white-space: nowrap;
  pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* color panel */
#color-panel-backdrop {
  position: absolute;
  inset: 0;
  z-index: 49;
  display: none;
}
#color-panel-backdrop.open { display: block; }

#color-panel {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: #1a1208;
  border-top: 2px solid rgba(237,232,222,0.15);
  padding: 16px;
  display: none;
  z-index: 50;
  max-height: 55vh;
  overflow-y: auto;
}
#color-panel.open { display: block; }

.color-panel-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.cp-swatch {
  width: 36px;
  height: 36px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform 0.1s, border-color 0.1s;
  flex-shrink: 0;
}
.cp-swatch:hover { transform: scale(1.15); }
.cp-swatch.active { border-color: white; transform: scale(1.1); }

/* text bar */
#text-bar {
  background: var(--ink);
  border-bottom: 2px solid var(--red);
  padding: 8px 12px;
  display: flex;
  gap: 8px;
  align-items: center;
}
#text-bar input {
  flex: 1;
  font-family: 'Courier Prime', monospace;
  font-size: 0.9rem;
  background: rgba(237,232,222,0.1);
  border: 1px solid rgba(237,232,222,0.2);
  color: var(--paper);
  padding: 6px 10px;
  outline: none;
}
#text-bar input::placeholder { color: rgba(237,232,222,0.3); }
#text-bar button {
  font-family: 'Courier Prime', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.06em;
  padding: 6px 12px;
  background: transparent;
  border: 1.5px solid rgba(237,232,222,0.3);
  color: var(--paper);
  cursor: pointer;
  white-space: nowrap;
}
#text-bar button:first-of-type { background: var(--red); border-color: var(--red); }

/* tap indicator for text tool */
#text-tap-hint {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Courier Prime', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(0,0,0,0.25);
  pointer-events: none;
  display: none;
  text-align: center;
}
#text-tap-hint.visible { display: block; }
#lightbox {
  position: fixed;
  inset: 0;
  z-index: 900;
  background: rgba(20,12,6,0.92);
  display: none;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
#lightbox.open { display: flex; }
#lightbox img {
  max-width: 90vw;
  max-height: 90vh;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  display: block;
}

/* new card fade-in */
@keyframes cardIn {
  from { opacity: 0; transform: scale(0.92) rotate(var(--rot, 0deg)); }
  to   { opacity: 1; transform: scale(1)    rotate(var(--rot, 0deg)); }
}
.wall-card.new-card .wall-card-inner {
  animation: cardIn 0.5s cubic-bezier(0.2,0,0.2,1) forwards;
}
#admin-login {
  position: fixed;
  inset: 0;
  z-index: 800;
  background: rgba(240,235,224,0.97);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
}
#admin-login.open { display: flex; }
#admin-login p {
  font-size: 0.65rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
}
#admin-pw {
  font-family: 'Courier Prime', monospace;
  font-size: 0.9rem;
  border: none;
  border-bottom: 2px solid var(--ink);
  background: transparent;
  padding: 6px 8px;
  width: 220px;
  outline: none;
  text-align: center;
  letter-spacing: 0.1em;
}
#admin-pw-err {
  font-size: 0.62rem;
  color: var(--red);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  min-height: 1em;
}

.delete-btn {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 22px;
  height: 22px;
  background: var(--red);
  color: white;
  border: none;
  font-size: 0.7rem;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 20;
  line-height: 1;
}
body.admin-mode .delete-btn { display: flex; }
</style>
</head>
<body>

<div id="main-page">
  <h1 class="site-title">Lascaux</h1>
  <div class="site-sub">the living wall</div>
  <div class="site-tagline">
    <p>draw something</p>
    <p>no rules</p>
    <p>leave a mark</p>
  </div>
  <div id="wall">
    <div id="wall-loading">loading the wall...</div>
    <div id="empty-state" style="display:none">be the first to draw something.</div>
  </div>
</div>

<button id="fab" onclick="openFormatPicker()">+</button>

<div id="format-picker">
  <button class="picker-close" onclick="closeFormatPicker()">✕ close</button>
  <div class="picker-label">choose your format</div>
  <div class="format-options">
    <div class="fmt-option" onclick="selectFormat(this,'portrait',320,480)">
      <div class="fmt-box fmt-portrait"></div>
      <span class="fmt-name">portrait</span>
    </div>
    <div class="fmt-option" onclick="selectFormat(this,'landscape',480,320)">
      <div class="fmt-box fmt-landscape"></div>
      <span class="fmt-name">landscape</span>
    </div>
    <div class="fmt-option" onclick="selectFormat(this,'square',400,400)">
      <div class="fmt-box fmt-square"></div>
      <span class="fmt-name">square</span>
    </div>
  </div>
  <button id="start-drawing-btn" onclick="openDrawPanel()">draw →</button>
</div>

<div id="draw-panel">
  <div class="draw-toolbar">
    <div class="toolbar-row">
      <button class="tool-btn active" id="btn-brush" onclick="setTool('brush')">brush</button>
      <button class="tool-btn" id="btn-eraser" onclick="setTool('eraser')">eraser</button>
      <button class="tool-btn" id="btn-fill" onclick="setTool('fill')">fill</button>
      <div style="flex:1"></div>
      <button class="tool-btn" onclick="undoCanvas()">↩ undo</button>
      <button class="tool-btn" onclick="clearCanvas()">clear</button>
      <button class="tool-btn" onclick="closeDrawPanel()">✕</button>
    </div>
    <div class="toolbar-row">
      <span class="tlabel">size</span>
      <input type="range" id="brush-size" min="1" max="80" value="5" oninput="updateSize(this.value)" style="flex:1;">
      <span id="size-label" style="font-size:0.8rem;min-width:24px;color:rgba(237,232,222,0.8);flex-shrink:0;">5</span>
      <span class="tlabel" style="margin-left:12px;">color</span>
      <div id="current-color" onclick="toggleColorPanel()" style="width:32px;height:32px;background:#888480;border:2px solid rgba(237,232,222,0.4);cursor:pointer;flex-shrink:0;"></div>
    </div>
  </div>

  <div id="canvas-area">
    <canvas id="draw-canvas"></canvas>
    <div id="brush-cursor"></div>
  </div>

  <div id="color-panel-backdrop" onclick="toggleColorPanel()"></div>

  <!-- COLOR PANEL OVERLAY -->
  <div id="color-panel" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <span style="font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(237,232,222,0.5);">wähle eine farbe</span>
      <button onclick="event.stopPropagation();toggleColorPanel()" style="background:rgba(237,232,222,0.15);border:none;color:var(--paper);font-size:0.72rem;cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;font-family:'Courier Prime',monospace;padding:8px 14px;">✕ schließen</button>
    </div>
    <div class="color-panel-grid" id="color-grid"></div>
  </div>

  <div class="draw-footer">
    <input type="text" id="drawing-title" placeholder="title / name (optional)" maxlength="40">
    <div class="footer-spacer"></div>
    <span id="submit-status"></span>
    <button class="btn ghost" onclick="clearCanvas()">clear</button>
    <button class="btn cta" onclick="submitDrawing()">submit to wall →</button>
  </div>
</div>

<div id="toast"></div>

<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="">
</div>

<div id="admin-login">
  <p>admin access</p>
  <input type="password" id="admin-pw" placeholder="password" autocomplete="off">
  <div id="admin-pw-err"></div>
  <button class="btn cta" onclick="checkAdminPw()">enter →</button>
  <button class="btn ghost" onclick="document.getElementById('admin-login').classList.remove('open')">cancel</button>
</div>

<script>
const SUPABASE_URL = 'https://cysocgicdmscmojhojyx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN5c29jZ2ljZG1zY21vamhvanl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODU4MDEsImV4cCI6MjA5MDI2MTgwMX0.mytbOTDXcd-1RwlO7RnfBaB_HjOxQ8s9asIbWwLyPSs';
const BUCKET = 'drawings';

async function sbList() {
  const r = await fetch(`${SUPABASE_URL}/storage/v1/object/list/${BUCKET}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ limit: 500, offset: 0, prefix: '', sortBy: { column: 'created_at', order: 'desc' } })
  });
  if (!r.ok) { console.error('sbList failed:', r.status, await r.text()); return []; }
  const data = await r.json();
  console.log('sbList response:', data);
  return Array.isArray(data) ? data : [];
}

async function sbUpload(filename, blob) {
  const r = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${filename}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'image/png' },
    body: blob
  });
  return r.ok;
}

function sbPublicUrl(f) {
  return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${f}`;
}

function openFormatPicker() {

}

function selectFormat(el, name, w, h) {

const canvas = document.getElementById('draw-canvas');
const ctx = canvas.getContext('2d');
let tool = 'brush', drawing = false, brushSize = 5, brushColor = '#888480';
let lastX = 0, lastY = 0;
let undoStack = [];

function saveUndo() {
  undoStack.push(canvas.toDataURL());
  if (undoStack.length > 40) undoStack.shift();
}

function undoCanvas() {
  if (undoStack.length === 0) return;
  const prev = undoStack.pop();
  const img = new Image();
  img.onload = () => { ctx.clearRect(0,0,CANVAS_W,CANVAS_H); ctx.drawImage(img,0,0); };
  img.src = prev;
}

function setupCanvas() {
  const area = document.getElementById('canvas-area');
  const scale = Math.min((area.clientWidth - 40) / CANVAS_W, (area.clientHeight - 40) / CANVAS_H, 1);
  canvas.style.width  = (CANVAS_W * scale) + 'px';
  canvas.style.height = (CANVAS_H * scale) + 'px';
  canvas.width = CANVAS_W; canvas.height = CANVAS_H;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  undoStack = [];
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return [(src.clientX - rect.left) * (CANVAS_W / rect.width), (src.clientY - rect.top) * (CANVAS_H / rect.height)];
}

function startDraw(e) {
  if (tool === 'fill') { saveUndo(); floodFill(e); return; }
  saveUndo();
  drawing = true;
  [lastX, lastY] = getPos(e);
  ctx.beginPath();
  ctx.arc(lastX, lastY, (tool === 'eraser' ? brushSize * 2 : brushSize) / 2, 0, Math.PI * 2);
  ctx.fillStyle = tool === 'eraser' ? '#ffffff' : brushColor;
  ctx.fill();
}

function doDraw(e) {
  if (!drawing) return;
  e.preventDefault();
  const [x, y] = getPos(e);
  ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y);
  ctx.strokeStyle = tool === 'eraser' ? '#ffffff' : brushColor;
  ctx.lineWidth = tool === 'eraser' ? brushSize * 2.5 : brushSize;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
  [lastX, lastY] = [x, y];
}

function stopDraw() { drawing = false; }

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', e => { doDraw(e); updateBrushCursor(e); });
canvas.addEventListener('mouseup', stopDraw);
canvas.addEventListener('mouseleave', () => { stopDraw(); document.getElementById('brush-cursor').style.display = 'none'; });
canvas.addEventListener('mouseenter', () => { if (tool !== 'text') document.getElementById('brush-cursor').style.display = 'block'; });
canvas.addEventListener('touchstart', e => { e.preventDefault(); startDraw(e); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); doDraw(e); },    { passive: false });
canvas.addEventListener('touchend', stopDraw);

function updateBrushCursor(e) {
  if (tool === 'text') { document.getElementById('brush-cursor').style.display = 'none'; return; }
  const rect = canvas.getBoundingClientRect();
  const scaleX = rect.width / CANVAS_W;
  const scaleY = rect.height / CANVAS_H;
  const areaRect = document.getElementById('canvas-area').getBoundingClientRect();
  const cx = e.clientX - areaRect.left;
  const cy = e.clientY - areaRect.top;
  const actualSize = (tool === 'eraser' ? brushSize * 2.5 : brushSize) * scaleX;
  const cursor = document.getElementById('brush-cursor');
  cursor.style.display = 'block';
  cursor.style.left = cx + 'px';
  cursor.style.top  = cy + 'px';
  cursor.style.width  = actualSize + 'px';
  cursor.style.height = actualSize + 'px';
}

function updateBrushCursor(e) {
  if (tool === 'text' || tool === 'fill') { document.getElementById('brush-cursor').style.display = 'none'; return; }
  const rect = canvas.getBoundingClientRect();
  const scaleX = rect.width / CANVAS_W;
  const areaRect = document.getElementById('canvas-area').getBoundingClientRect();
  const cx = e.clientX - areaRect.left;
  const cy = e.clientY - areaRect.top;
  const actualSize = (tool === 'eraser' ? brushSize * 2.5 : brushSize) * scaleX;
  const cursor = document.getElementById('brush-cursor');
  cursor.style.display = 'block';
  cursor.style.left = cx + 'px';
  cursor.style.top  = cy + 'px';
  cursor.style.width  = actualSize + 'px';
  cursor.style.height = actualSize + 'px';
}

document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
    e.preventDefault();
    undoCanvas();
  }
});

function setTool(t) {
  tool = t;
  ['brush','eraser','fill'].forEach(id => {
    const el = document.getElementById('btn-'+id);
    if (el) el.classList.toggle('active', id===t);
  });
  if (t === 'fill') document.getElementById('brush-cursor').style.display = 'none';
}
function updateSize(v) {
  brushSize = parseInt(v);
  document.getElementById('size-label').textContent = v;
}

function buildColorPanel() {

function toggleColorPanel() {

function clearCanvas() { ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H); }

async function submitDrawing() {
  const status = document.getElementById('submit-status');
  const data = ctx.getImageData(0,0,CANVAS_W,CANVAS_H).data;
  const isBlank = [...data].every((v,i) => i%4===3 ? true : v===255);
  if (isBlank) { showToast('draw something first'); return; }
  status.textContent = 'uploading...';
  canvas.toBlob(async blob => {
    const title = document.getElementById('drawing-title').value.trim() || 'untitled';
    const safe = title.replace(/[^a-z0-9]/gi,'_').toLowerCase();
    const fmt = selectedFormat ? selectedFormat.name : 'sq';
    const filename = `${Date.now()}_${fmt}_${safe}.png`;
    const ok = await sbUpload(filename, blob);
    if (ok) {
      status.textContent = '';
      closeDrawPanel();
      showToast('your mark is on the wall');
      clearCanvas();
      document.getElementById('drawing-title').value = '';
      document.querySelectorAll('.fmt-option').forEach(f => f.classList.remove('selected'));
      document.getElementById('start-drawing-btn').classList.remove('ready');
      selectedFormat = null;
      setTimeout(loadWall, 1200);
    } else {
      status.textContent = 'upload failed — try again';
    }
  }, 'image/png');
}

function addCardToWall(file, isNew = false) {
  const name = file.name || '';
  if (!name) return;
  knownFiles.add(name);
  const parts = name.replace('.png','').split('_');
  parts.shift(); parts.shift();
  const title = parts.join(' ') || '';
  const card = document.createElement('div');
  card.className = 'wall-card' + (isNew ? ' new-card' : '');
  const inner = document.createElement('div');
  inner.className = 'wall-card-inner';
  const img = document.createElement('img');
  img.src = sbPublicUrl(name);
  img.alt = title;
  img.loading = 'lazy';
  img.style.cursor = 'zoom-in';
  img.onclick = () => openLightbox(sbPublicUrl(name));
  inner.appendChild(img);
  if (title && title !== 'untitled') {
    const titleEl = document.createElement('div');
    titleEl.className = 'wall-card-title';
    titleEl.textContent = title;
    inner.appendChild(titleEl);
  }
  const delBtn = document.createElement('button');
  delBtn.className = 'delete-btn';
  delBtn.textContent = '✕';
  delBtn.onclick = (e) => { e.stopPropagation(); deleteDrawing(name, card); };
  inner.appendChild(delBtn);
  card.appendChild(inner);
  const wall = document.getElementById('wall');
  if (isNew) {
    wall.insertBefore(card, wall.firstChild);
  } else {
    wall.appendChild(card);
  }
}

async function loadWall() {
  const wall = document.getElementById('wall');
  const loading = document.getElementById('wall-loading');
  const empty = document.getElementById('empty-state');
  loading.style.display = 'block';
  empty.style.display = 'none';
  wall.querySelectorAll('.wall-card').forEach(c => c.remove());
  knownFiles.clear();
  const files = await sbList();
  loading.style.display = 'none';
  if (!files || files.length === 0) { empty.style.display = 'block'; return; }
  files.forEach(file => addCardToWall(file, false));
  return true;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');

}

window.addEventListener('resize', () => {
  if (document.getElementById('draw-panel').classList.contains('open')) setupCanvas();
});

// ── FLOOD FILL ──
function floodFill(e) {
  const [startX, startY] = getPos(e).map(Math.floor);
  const imageData = ctx.getImageData(0, 0, CANVAS_W, CANVAS_H);
  const data = imageData.data;
  const idx = (startY * CANVAS_W + startX) * 4;
  const targetR = data[idx], targetG = data[idx+1], targetB = data[idx+2], targetA = data[idx+3];

  const fillColor = hexToRgb(brushColor);
  if (targetR===fillColor[0] && targetG===fillColor[1] && targetB===fillColor[2]) return;

  const stack = [[startX, startY]];
  while (stack.length) {
    const [x, y] = stack.pop();
    if (x < 0 || x >= CANVAS_W || y < 0 || y >= CANVAS_H) continue;
    const i = (y * CANVAS_W + x) * 4;
    if (data[i]!==targetR || data[i+1]!==targetG || data[i+2]!==targetB || data[i+3]!==targetA) continue;
    data[i]=fillColor[0]; data[i+1]=fillColor[1]; data[i+2]=fillColor[2]; data[i+3]=255;
    stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
  ctx.putImageData(imageData, 0, 0);
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

// ── LIGHTBOX ──
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ── LIVE RELOAD ──
let knownFiles = new Set();

function startLiveReload() {
  setInterval(async () => {
    if (document.getElementById('draw-panel').classList.contains('open')) return;
    const files = await sbList();
    if (!files || files.length === 0) return;
    const newFiles = files.filter(f => f.name && !knownFiles.has(f.name));
    if (newFiles.length === 0) return;
    newFiles.forEach(file => addCardToWall(file, true));
  }, 15000);
}
const ADMIN_PW = 'LascauxArtAdmin';
let isAdmin = false;

function checkAdminPw() {
  const pw = document.getElementById('admin-pw').value;
  if (pw === ADMIN_PW) {
    isAdmin = true;
    document.body.classList.add('admin-mode');
    document.getElementById('admin-login').classList.remove('open');
    document.getElementById('admin-pw').value = '';
    document.getElementById('admin-pw-err').textContent = '';
    showToast('admin mode active');
  } else {
    document.getElementById('admin-pw-err').textContent = 'wrong password';
  }
}

document.getElementById('admin-pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkAdminPw();
});

async function deleteDrawing(filename, cardEl) {
  if (!isAdmin) return;
  if (!confirm('Delete this drawing?')) return;
  const r = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${filename}`, {
    method: 'DELETE',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if (r.ok) {
    cardEl.remove();
    showToast('deleted');
  } else {
    showToast('delete failed');
  }
}

  document.getElementById('admin-login').classList.add('open');
  setTimeout(() => document.getElementById('admin-pw').focus(), 100);
}
function generateFavicon() {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 256;
  const x = c.getContext('2d');
  x.fillStyle = '#f0ebe0';
  x.fillRect(0, 0, 256, 256);
  x.fillStyle = '#7a1f10';
  x.font = '210px "Special Elite", serif';
  x.textAlign = 'center';
  x.textBaseline = 'middle';
  x.fillText('L', 128, 140);
  document.getElementById('favicon').href = c.toDataURL('image/png');
}

// wait for Special Elite to load

  document.fonts.ready.then(generateFavicon);
} else {
  window.addEventListener('load', generateFavicon);
}

buildColorPanel();
loadWall().then(startLiveReload);
